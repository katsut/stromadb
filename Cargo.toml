[workspace]
members = ["crates/stroma-core", "crates/stroma-cli"]
resolver = "2"

[workspace.package]
edition = "2024"
license = "LicenseRef-ELv2"
repository = "https://github.com/katsut/stromadb"

[profile.dev]
opt-level = 0
debug = "line-tables-only"

[profile.dev.package."*"]
opt-level = 1

[profile.release]
opt-level = 3
lto = "thin"
strip = true
