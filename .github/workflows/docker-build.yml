name: docker-build

on:
  pull_request:
    paths:
      - Dockerfile
      - .dockerignore
      - .cargo/**
      - .github/workflows/docker-build.yml

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha,scope=amd64
